<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Editar Notícia</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 350px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #219150;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #555;
        }

        .voltar:hover {
            color: #000;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Editar Notícia</h1>

        <form th:action="@{/SalvarEdicao}" method="post" th:object="${noticia}">

            <input type="hidden" th:field="*{id}" />

            <label for="titulo">Título</label>
            <input type="text" th:field="*{titulo}" id="titulo" />

            <label for="assunto">Assunto</label>
            <input type="text" th:field="*{assunto}" id="assunto" />

            <label for="conteudo">Conteúdo</label>
            <textarea th:field="*{conteudo}" id="conteudo"></textarea>

            <button type="submit">Salvar Alterações</button>

        </form>

        <a href="/Index" class="voltar">Voltar</a>
    </div>

</body>

</html>
