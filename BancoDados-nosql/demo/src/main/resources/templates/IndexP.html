<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agência de Notícias</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            background: #2c3e50;
            color: white;
            padding: 20px;
            margin: 0;
        }

        .container {
            margin-top: 40px;
        }

        a {
            display: inline-block;
            margin: 15px;
            padding: 12px 25px;
            text-decoration: none;
            color: white;
            background: #3498db;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: bold;
        }

        a:hover {
            background: #2980b9;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h1>Agência de Notícias Web</h1>

    <div class="container">
        <a href="/cadastroAutor">Cadastrar autor</a><br>
        <a href="/cadastrar">Cadastrar notícia</a><br>
        <a href="/imprimir">Ver notícias cadastradas</a>
    </div>

</body>
</html>
