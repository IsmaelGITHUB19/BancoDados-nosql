<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        h1 {
            background: #2c3e50;
            color: white;
            padding: 20px;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .card h2 {
            color: #2c3e50;
            margin-top: 0;
        }

        .card p {
            margin: 5px 0;
            color: #555;
        }

        .card .conteudo {
            margin-top: 10px;
        }

        .acoes {
            margin-top: 15px;
        }

        .acoes a {
            text-decoration: none;
            margin-right: 10px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            color: white;
        }

        .editar {
            background: #3498db;
        }

        .editar:hover {
            background: #2980b9;
        }

        .excluir {
            background: #e74c3c;
        }

        .excluir:hover {
            background: #c0392b;
        }

        .voltar {
            display: block;
            text-align: center;
            margin: 20px;
            text-decoration: none;
            color: #555;
        }

        .voltar:hover {
            color: #000;
        }
    </style>
</head>

<body>

    <h1>Notícias Cadastradas</h1>

    <div class="container">

        <div class="card" th:each="noticia : ${noticias}">
            
            <h2 th:text="${noticia.titulo}">Título</h2>

            <p><strong>ID:</strong> <span th:text="${noticia.id}">ID</span></p>

            <p><strong>Assunto:</strong> <span th:text="${noticia.assunto}">Assunto</span></p>

            <div class="conteudo">
                <strong>Conteúdo:</strong>
                <p th:text="${noticia.conteudo}">Conteúdo da notícia</p>
            </div>

            <div class="acoes">
                <a class="editar"
                   th:href="@{/Editar(id=${noticia.id})}">
                   Editar
                </a>

                <a class="excluir"
                   th:href="@{/Excluir(id=${noticia.id}, assunto=${noticia.assunto})}">
                   Excluir
                </a>
            </div>

        </div>

    </div>

    <a href="/Index" class="voltar">Voltar</a>

</body>

</html>
