<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Notícia</title>
</head>

<body>
    <h1>Cadastrar notícia</h1>

    <!-- O action precisa bater com o @PostMapping("/salvar") -->
    <form action="/salvar" method="post">
         <label for="id">ID</label><br>
        <input type="text" name="id" id="id">
        <br>

        <label for="titulo">Título</label><br>
        <input type="text" name="titulo" id="titulo">
        <br>

        <label for="autor">Nome do autor</label><br>
        <input type="text" name="autor" id="autor"> <!-- 'name' idêntico à variável no Java -->
        <br>

        <label for="email">Email do autor</label><br>
        <input type="email" name="email" id="email">
        <br>

        <label for="dataNascimento">Data de nascimento</label><br>
        <input type="date" name="dataNascimento" id="dataNascimento">
        <br>

        <label for="assunto">Assunto</label><br>
        <input type="text" name="assunto" id="assunto">
        <br>

        <label for="conteudo">Conteúdo</label><br>
        <textarea name="conteudo" id="conteudo"></textarea>
        <br>

        <button type="submit">Cadastrar</button>
    </form>
    <br>
    <a href="/imprimir">Ver noticias cadastradas</a>
</body>

</html>
